services:
  gerrit:
    image: gerritcodereview/gerrit:3.13.4
    container_name: gerrit-dev
    volumes:
      - gerrit-dev-data:/var/gerrit
      - ../frontend/dist/spdk-checks.js:/var/gerrit/plugins/spdk-checks.js:ro
    environment:
      - CANONICAL_WEB_URL=http://localhost:9080
    networks:
      - dev

  checks-api:
    image: checks-api-dev:latest
    container_name: checks-api-dev
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - CHECKS_GITHUB_TOKEN=fake-dev-token
      - CHECKS_GITHUB_WEBHOOK_SECRET=
      - CHECKS_DATABASE_PATH=/app/data/checks.db
      - GERRIT_URL=http://gerrit:8080
      - LOG_LEVEL=DEBUG
    volumes:
      - checks-dev-data:/app/data
    networks:
      - dev

  nginx:
    image: nginx:1.22.1
    container_name: nginx-dev
    ports:
      - "9080:80"
    depends_on:
      - gerrit
      - checks-api
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dev

volumes:
  gerrit-dev-data:
  checks-dev-data:

networks:
  dev:
    driver: bridge
